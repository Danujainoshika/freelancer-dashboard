name: Deploy Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          set -e

          echo "Setting up SSH..."
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p $EC2_PORT -H $EC2_HOST >> ~/.ssh/known_hosts

          echo "Connecting to EC2 and deploying..."

          ssh -i ~/.ssh/deploy_key -p $EC2_PORT $EC2_USER@$EC2_HOST << 'EOF'
            set -e

            cd /home/ubuntu/freelancer-dashboard

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            npm install

            echo "Building project..."
            npm run build

            echo "Restarting Nginx..."
            sudo systemctl restart nginx

            echo "Deployment complete!"
          EOF
